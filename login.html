<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Revaix Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08080d;--surface:#111118;--border:#242430;--accent:#6ee7b7;--accent2:#818cf8;--text:#eeeef5;--muted:#64648a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
    .content{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.02em;margin-bottom:36px;text-decoration:none;color:var(--text);}
    .logo span{color:var(--accent);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:6px;}
    .subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:32px;line-height:1.5;}
    .field{margin-bottom:20px;}
    label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
    input{width:100%;background:rgba(255,255,255,0.03);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;padding:12px 16px;outline:none;transition:border-color 0.15s;}
    input:focus{border-color:var(--accent);}
    .field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .field-row label{margin-bottom:0;}
    .forgot{font-size:0.75rem;color:var(--accent2);text-decoration:none;font-weight:500;}
    .forgot:hover{text-decoration:underline;}
    .btn{width:100%;background:var(--accent);color:#08080d;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;padding:14px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(110,231,183,0.3);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
    .alert{border-radius:10px;font-size:0.82rem;padding:11px 14px;margin-bottom:20px;display:none;line-height:1.5;}
    .alert-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;}
    .alert-success{background:rgba(110,231,183,0.08);border:1px solid rgba(110,231,183,0.25);color:var(--accent);}
    .footer-link{text-align:center;font-size:0.83rem;color:var(--muted);margin-top:24px;}
    .footer-link a{color:var(--accent);text-decoration:none;font-weight:600;}
    .footer-link a:hover{text-decoration:underline;}
    .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:0.75rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  </style>
</head>
<body>
  <div class="content">
    <a href="/" class="logo">Revaix <span>Study</span></a>

    <div class="card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to continue studying</p>

      <div class="alert alert-error" id="errorMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot" id="forgotLink">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn" id="signInBtn">Sign in</button>

      <div class="divider">or</div>

      <div class="footer-link">
        Don't have an account? <a href="/signup">Sign up free →</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://jaaqqoeukhlkbvnzhdqt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphYXFxb2V1a2hsa2J2bnpoZHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDk2MjQsImV4cCI6MjA4OTk4NTYyNH0.1pz8cvgdYfUo5i5mQeobsfLsVdUXNA4R8piw9QZhRkY'
    );

    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan');
    const redirectAfterAuth = plan ? '/api/checkout?plan=' + plan : (params.get('redirect') || '/app');

    // Redirect if already signed in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = redirectAfterAuth;
    });

    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');
    const btn      = document.getElementById('signInBtn');
    const errorEl  = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');

    function showError(msg)   { errorEl.textContent = msg;   errorEl.style.display = 'block';   successEl.style.display = 'none'; }
    function showSuccess(msg) { successEl.textContent = msg; successEl.style.display = 'block';  errorEl.style.display = 'none'; }
    function clearMessages()  { errorEl.style.display = 'none'; successEl.style.display = 'none'; }

    async function signIn() {
      const email    = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      clearMessages();

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message === 'Email not confirmed'
          ? 'Please confirm your email first — check your inbox.'
          : error.message);
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }

      window.location.href = redirectAfterAuth;
    }

    document.getElementById('forgotLink').addEventListener('click', async e => {
      e.preventDefault();
      const email = emailEl.value.trim();
      if (!email) { showError('Enter your email above first.'); return; }
      clearMessages();

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://revaixstudy.com/reset-password',
      });

      if (error) { showError(error.message); return; }
      showSuccess('Password reset email sent — check your inbox.');
    });

    btn.addEventListener('click', signIn);
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
  </script>
</body>
</html>
