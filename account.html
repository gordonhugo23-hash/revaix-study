<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Revaix Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08080d;--surface:#111118;--surface2:#18181f;--border:#242430;--accent:#6ee7b7;--accent2:#818cf8;--accent3:#fbbf24;--text:#eeeef5;--muted:#64648a;--danger:#f87171;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,13,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(100,100,138,0.15);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;text-decoration:none;color:var(--text);}
    .nav-logo span{color:var(--accent);}
    .nav-back{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:0.83rem;font-weight:500;transition:color 0.2s;}
    .nav-back:hover{color:var(--text);}
    .nav-right{display:flex;align-items:center;gap:16px;}
    .sign-out-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font-size:0.78rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
    .sign-out-btn:hover{border-color:var(--danger);color:var(--danger);}

    /* LAYOUT */
    .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 80px;}

    /* PROFILE CARD */
    .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:32px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
    .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#08080d;flex-shrink:0;}
    .profile-info{flex:1;min-width:200px;}
    .profile-email{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:8px;}
    .plan-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:0.72rem;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.06em;}
    .plan-free{background:rgba(100,100,138,0.15);color:var(--muted);border:1px solid rgba(100,100,138,0.2);}
    .plan-student{background:rgba(110,231,183,0.12);color:var(--accent);border:1px solid rgba(110,231,183,0.25);}
    .plan-serious{background:rgba(251,191,36,0.12);color:var(--accent3);border:1px solid rgba(251,191,36,0.25);}
    .profile-stats{display:flex;gap:24px;flex-wrap:wrap;}
    .stat{text-align:center;}
    .stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--accent);}
    .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
    .upgrade-btn{background:linear-gradient(135deg,var(--accent2),#6366f1);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;text-decoration:none;transition:all 0.2s;white-space:nowrap;}
    .upgrade-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(129,140,248,0.35);}

    /* TABS */
    .tabs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;}
    .tab-btn{padding:8px 16px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;font-size:0.78rem;cursor:pointer;background:none;color:var(--muted);transition:all 0.2s;white-space:nowrap;}
    .tab-btn.active{background:rgba(110,231,183,0.12);color:var(--accent);border:1px solid rgba(110,231,183,0.2);}
    .tab-btn:hover:not(.active){color:var(--text);}
    .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;}

    /* PACKS GRID */
    .packs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .pack-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.2s;cursor:pointer;position:relative;}
    .pack-card:hover{border-color:rgba(110,231,183,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
    .pack-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px;}
    .pack-type-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:0.68rem;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
    .type-notes{background:rgba(110,231,183,0.1);color:var(--accent);border:1px solid rgba(110,231,183,0.2);}
    .type-flashcards{background:rgba(129,140,248,0.1);color:var(--accent2);border:1px solid rgba(129,140,248,0.2);}
    .type-exam{background:rgba(251,191,36,0.1);color:var(--accent3);border:1px solid rgba(251,191,36,0.2);}
    .type-marking{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
    .pack-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text);line-height:1.3;word-break:break-word;}
    .pack-date{font-size:0.72rem;color:var(--muted);margin-top:8px;}
    .pack-actions{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
    .pack-btn{flex:1;padding:8px 12px;border-radius:8px;font-size:0.75rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:none;color:var(--muted);}
    .pack-btn:hover{border-color:var(--accent);color:var(--accent);}
    .pack-btn.danger:hover{border-color:var(--danger);color:var(--danger);}
    .fav-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:2px;transition:transform 0.15s;flex-shrink:0;}
    .fav-btn:hover{transform:scale(1.2);}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:60px 24px;color:var(--muted);}
    .empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.5;}
    .empty-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:8px;}
    .empty-desc{font-size:0.83rem;line-height:1.6;}
    .empty-cta{display:inline-block;margin-top:20px;background:var(--accent);color:#08080d;border:none;border-radius:10px;padding:10px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;text-decoration:none;}

    /* UPGRADE GATE */
    .upgrade-gate{background:var(--surface);border:1px solid rgba(251,191,36,0.2);border-radius:20px;padding:40px;text-align:center;margin-bottom:32px;}
    .upgrade-gate-icon{font-size:2.5rem;margin-bottom:16px;}
    .upgrade-gate-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:8px;}
    .upgrade-gate-desc{color:var(--muted);font-size:0.85rem;line-height:1.6;margin-bottom:24px;}

    /* LOADING */
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:0.85rem;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* PACK VIEWER MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:800px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;}
    .modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;transition:color 0.2s;padding:4px;}
    .modal-close:hover{color:var(--text);}
    .modal-body{padding:24px;overflow-y:auto;flex:1;}
    .modal-body .pack-content{font-size:0.85rem;line-height:1.7;color:var(--text);}
    .modal-body h1,.modal-body h2,.modal-body h3{font-family:'Syne',sans-serif;font-weight:700;margin:16px 0 8px;}
    .modal-body p{margin-bottom:12px;}
    .modal-body ul,.modal-body ol{padding-left:20px;margin-bottom:12px;}
    .modal-body li{margin-bottom:6px;}

    @media(max-width:640px){
      .profile-card{padding:20px;}
      .tabs{flex-wrap:wrap;}
      .tab-btn{font-size:0.72rem;padding:6px 12px;}
      .page{padding:20px 16px 60px;}
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Revaix <span>Study</span></a>
  <div class="nav-right">
    <a href="/app" class="nav-back">← Back to app</a>
    <button class="sign-out-btn" id="signOutBtn">Sign out</button>
  </div>
</nav>

<div class="page">

  <!-- Profile Card -->
  <div class="profile-card" id="profileCard">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Saved Packs Section -->
  <div id="packsSection">
    <div class="tabs-header">
      <div class="section-title">My Study Packs</div>
      <div class="tabs" id="tabBar">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="favourite">⭐ Favourites</button>
        <button class="tab-btn" data-filter="notes">📝 Notes</button>
        <button class="tab-btn" data-filter="flashcards">🃏 Flashcards</button>
        <button class="tab-btn" data-filter="exam">✏️ Exams</button>
        <button class="tab-btn" data-filter="marking">📋 Marking</button>
      </div>
    </div>
    <div id="packsContainer"><div class="loading"><div class="spinner"></div>Loading your study packs…</div></div>
  </div>

</div>

<!-- Pack Viewer Modal -->
<div class="modal-overlay" id="packModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://jaaqqoeukhlkbvnzhdqt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphYXFxb2V1a2hsa2J2bnpoZHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDk2MjQsImV4cCI6MjA4OTk4NTYyNH0.1pz8cvgdYfUo5i5mQeobsfLsVdUXNA4R8piw9QZhRkY'
);

let session = null;
let userPlan = 'free';
let allPacks = [];
let currentFilter = 'all';

// ── Auth check ──
async function init() {
  const { data: { session: s } } = await sb.auth.getSession();
  if (!s) { window.location.href = '/login?redirect=/account'; return; }
  session = s;

  // Get user info
  const resp = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + s.access_token } });
  const data = await resp.json();
  userPlan = data.plan || 'free';

  renderProfile(data);
  await loadPacks();
}

// ── Profile ──
function renderProfile(data) {
  const planLabel = {
    free: 'Free',
    student: 'Student',
    student_yearly: 'Student (Yearly)',
    serious: 'Serious Student',
    serious_yearly: 'Serious Student (Yearly)',
  }[data.plan] || 'Free';

  const planClass = data.active
    ? (data.plan?.includes('serious') ? 'plan-serious' : 'plan-student')
    : 'plan-free';

  const initials = (data.email || 'U').slice(0, 2).toUpperCase();

  const usageHtml = !data.active
    ? `<div class="stat"><div class="stat-val">${data.generations_used || 0}<span style="font-size:1rem;color:var(--muted)">/3</span></div><div class="stat-label">Free uses</div></div>`
    : `<div class="stat"><div class="stat-val" style="color:var(--accent)">∞</div><div class="stat-label">Generations</div></div>`;

  const upgradeHtml = !data.active
    ? `<a href="/signup?plan=student" class="upgrade-btn">Upgrade to Student →</a>`
    : data.plan === 'student' || data.plan === 'student_yearly'
    ? `<a href="/signup?plan=serious" class="upgrade-btn">Upgrade to Serious →</a>`
    : '';

  document.getElementById('profileCard').innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="profile-info">
      <div class="profile-email">${data.email}</div>
      <span class="plan-badge ${planClass}">${planLabel}</span>
    </div>
    <div class="profile-stats">
      ${usageHtml}
      <div class="stat"><div class="stat-val" style="color:var(--accent2)">${allPacks.length}</div><div class="stat-label">Saved packs</div></div>
    </div>
    ${upgradeHtml}
  `;
}

// ── Load packs ──
async function loadPacks() {
  if (!session) return;

  const isSeriousPlan = userPlan === 'serious' || userPlan === 'serious_yearly';

  if (!isSeriousPlan) {
    document.getElementById('packsContainer').innerHTML = `
      <div class="upgrade-gate">
        <div class="upgrade-gate-icon">🔒</div>
        <div class="upgrade-gate-title">Save study packs with Serious Student</div>
        <div class="upgrade-gate-desc">Upgrade to Serious Student to save your notes, flashcards, exams and marking results — and access them from any device, any time.</div>
        <a href="/signup?plan=serious" class="upgrade-btn">Upgrade to Serious Student →</a>
      </div>`;
    // Still update profile stats
    const profileEl = document.getElementById('profileCard');
    if (profileEl) {
      profileEl.querySelector('.stat:nth-child(2) .stat-val')?.setAttribute('data-count', 0);
    }
    return;
  }

  const { data, error } = await sb
    .from('saved_packs')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('packsContainer').innerHTML =
      `<div class="empty-state"><div class="empty-desc">Failed to load packs. Please refresh.</div></div>`;
    return;
  }

  allPacks = data || [];
  // Update stat count
  const statVal = document.querySelector('.profile-stats .stat:last-child .stat-val');
  if (statVal) statVal.textContent = allPacks.length;

  renderPacks();
}

// ── Render packs ──
function renderPacks() {
  const filtered = allPacks.filter(p => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'favourite') return p.is_favourite;
    return p.type === currentFilter;
  });

  if (filtered.length === 0) {
    const messages = {
      all: { icon: '📚', title: 'No saved study packs yet', desc: 'Generate a study pack in the app and hit Save to keep it here.' },
      favourite: { icon: '⭐', title: 'No favourites yet', desc: 'Star any pack to find it quickly here.' },
      notes: { icon: '📝', title: 'No saved notes', desc: 'Generate study notes and save them from the app.' },
      flashcards: { icon: '🃏', title: 'No saved flashcards', desc: 'Generate flashcards and save them from the app.' },
      exam: { icon: '✏️', title: 'No saved exams', desc: 'Generate a practice exam and save it from the app.' },
      marking: { icon: '📋', title: 'No saved marking', desc: 'Get your work marked and save the feedback here.' },
    };
    const m = messages[currentFilter] || messages.all;
    document.getElementById('packsContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${m.icon}</div>
        <div class="empty-title">${m.title}</div>
        <div class="empty-desc">${m.desc}</div>
        <a href="/app" class="empty-cta">Go to app →</a>
      </div>`;
    return;
  }

  const typeIcons = { notes: '📝', flashcards: '🃏', exam: '✏️', marking: '📋' };
  const typeLabels = { notes: 'Notes', flashcards: 'Flashcards', exam: 'Exam', marking: 'Marking' };

  document.getElementById('packsContainer').innerHTML = `
    <div class="packs-grid">
      ${filtered.map(pack => `
        <div class="pack-card" data-id="${pack.id}">
          <div class="pack-header">
            <span class="pack-type-badge type-${pack.type}">${typeIcons[pack.type] || '📄'} ${typeLabels[pack.type] || pack.type}</span>
            <button class="fav-btn" onclick="toggleFavourite('${pack.id}', event)" title="${pack.is_favourite ? 'Remove from favourites' : 'Add to favourites'}">
              ${pack.is_favourite ? '⭐' : '☆'}
            </button>
          </div>
          <div class="pack-title">${escapeHtml(pack.title)}</div>
          <div class="pack-date">${formatDate(pack.created_at)}</div>
          <div class="pack-actions">
            <button class="pack-btn" onclick="openPack('${pack.id}')">Open</button>
            <button class="pack-btn danger" onclick="deletePack('${pack.id}', event)">Delete</button>
          </div>
        </div>
      `).join('')}
    </div>`;
}

// ── Tabs ──
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderPacks();
});

// ── Toggle favourite ──
async function toggleFavourite(id, e) {
  e.stopPropagation();
  const pack = allPacks.find(p => p.id === id);
  if (!pack) return;
  const newVal = !pack.is_favourite;
  const { error } = await sb.from('saved_packs').update({ is_favourite: newVal }).eq('id', id);
  if (!error) {
    pack.is_favourite = newVal;
    renderPacks();
  }
}

// ── Delete pack ──
async function deletePack(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this study pack? This cannot be undone.')) return;
  const { error } = await sb.from('saved_packs').delete().eq('id', id);
  if (!error) {
    allPacks = allPacks.filter(p => p.id !== id);
    const statVal = document.querySelector('.profile-stats .stat:last-child .stat-val');
    if (statVal) statVal.textContent = allPacks.length;
    renderPacks();
  }
}

// ── Open pack viewer ──
function openPack(id) {
  const pack = allPacks.find(p => p.id === id);
  if (!pack) return;
  document.getElementById('modalTitle').textContent = pack.title;
  document.getElementById('modalBody').innerHTML = renderPackContent(pack);
  document.getElementById('packModal').classList.add('show');
}

function renderPackContent(pack) {
  const c = pack.content;
  if (pack.type === 'flashcards' && Array.isArray(c.cards)) {
    return `<div class="pack-content">${c.cards.map((card, i) =>
      `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;">
        <div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Card ${i+1}</div>
        <div style="font-weight:600;margin-bottom:8px">${escapeHtml(card.front || card.question || '')}</div>
        <div style="color:var(--accent);font-size:0.85rem;border-top:1px solid var(--border);padding-top:8px;margin-top:8px">${escapeHtml(card.back || card.answer || '')}</div>
      </div>`
    ).join('')}</div>`;
  }
  if (typeof c.html === 'string') return `<div class="pack-content">${c.html}</div>`;
  if (typeof c.text === 'string') return `<div class="pack-content" style="white-space:pre-wrap">${escapeHtml(c.text)}</div>`;
  return `<div class="pack-content"><pre style="font-size:0.8rem;overflow:auto">${JSON.stringify(c, null, 2)}</pre></div>`;
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('packModal').classList.remove('show');
});
document.getElementById('packModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ── Sign out ──
document.getElementById('signOutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '/login';
});

// ── Helpers ──
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
